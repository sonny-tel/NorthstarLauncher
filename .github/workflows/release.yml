name: Build
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Needed to write to GitHub draft release

env:
  NORTHSTAR_VERSION: ${{ github.ref_name }}

jobs:
  build-launcher:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
      - name: Checkout EOS SDK
        uses: actions/checkout@v4
        with:
          repository: r2ion/eos-ion
          token: ${{ secrets.EOS_PAT_TOKEN  }}
          path: primedev/thirdparty/eossdk
      - name: Setup msvc
        uses: ilammy/msvc-dev-cmd@v1
      - name: Configure cmake
        run: cmake -G "Ninja" -B build -DCMAKE_BUILD_TYPE:STRING="Release"
      - name: Setup resource file version
        shell: bash
        run: |
          sed -i 's/DEV/${{ env.NORTHSTAR_VERSION }}/g' primedev/primelauncher/resources.rc
          sed -i 's/DEV/${{ env.NORTHSTAR_VERSION }}/g' primedev/resources.rc

          # Extract version and patch from tag (e.g., v1.31.3_2)
          VERSION_FULL=$(echo ${{ env.NORTHSTAR_VERSION }} | sed 's/^v//')
          VERSION_BASE=$(echo ${VERSION_FULL} | cut -d'_' -f1)
          PATCH_VERSION=$(echo ${VERSION_FULL} | cut -d'_' -f2)

          # If no underscore, patch version is 0
          if [[ "${VERSION_FULL}" == "${PATCH_VERSION}" ]]; then
            PATCH_VERSION=0
          fi

          # Convert version to comma-separated format for FILEVERSION
          FILEVERSION=$(echo ${VERSION_BASE} | tr '.' ',')

          # Update ns_version.h with both version and patch
          sed -i "s/0,0,0,1/${FILEVERSION}/g" primedev/ns_version.h
          sed -i "s/#define ION_PATCH 0/#define ION_PATCH ${PATCH_VERSION}/g" primedev/ns_version.h
      - name: Build
        run: cmake --build build/
      - name: Upload launcher build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ion-launcher
          path: |
            build/game/*.exe
            build/game/*.dll
            build/game/bin/x64_retail/*.dll
      - name: Upload debug build artifact
        uses: actions/upload-artifact@v4
        with:
          name: launcher-debug-files
          path: |
            build/game/*.pdb
            build/game/bin/x64_retail/*.pdb

  upload-launcher-to-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-launcher
    runs-on: ubuntu-22.04
    steps:
      - name: Download compiled launcher
        uses: actions/download-artifact@v4
        with:
          name: ion-launcher
          path: ion-launcher
      - name: Download compiled launcher
        uses: actions/download-artifact@v4
        with:
          name: launcher-debug-files
          path: launcher-debug-files
      - name: Create zip with binaries
        run: |
          cd ion-launcher
          zip --recurse-paths --quiet ../ion-launcher.zip *
      - name: Create zip with debug symbols
        run: |
          cd launcher-debug-files
          zip --recurse-paths --quiet ../launcher-debug-files.zip *
      - name: Upload files to release
        uses: softprops/action-gh-release@v1
        with:
          body: ":warning: These are development files! If you want to download Ion, [go here instead](https://github.com/sonny-tel/Ion/releases) :warning:"
          draft: false
          files: |
            ion-launcher.zip
            launcher-debug-files.zip
